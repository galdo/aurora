name: macos

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '15 2 * * *'

  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3 or v1.2.3-beta)'
        type: string

permissions:
  contents: write

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Resolve version once (input, tag or commit)
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            BUILD="${GITHUB_RUN_NUMBER}"
            COMMIT="${GITHUB_SHA::7}"

            VERSION="${BASE_VERSION}-dev.${BUILD}.git${COMMIT}"
          fi

          # Remove 'v' to keep the slug consistent
          VERSION="${VERSION#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync app version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Build + Gatekeeper workaround + ZIP
      - name: Package macOS app
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          yarn package:mac

          if [ "$ARCH" = "arm64" ]; then
            APP_DIR="mac-arm64"
          else
            APP_DIR="mac"
          fi

          APP_PATH="release/${APP_DIR}/Aurora.app"
          ZIP_PATH="release/Aurora-macos-${ARCH}-${VERSION}.zip"

          # Ad-hoc sign (prevents "app is damaged")
          codesign --deep --force --sign - "$APP_PATH"

          # Remove Gatekeeper quarantine
          xattr -rd com.apple.quarantine "$APP_PATH"

          # Create distributable ZIP
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      # Always upload CI artifact
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: release/Aurora-macos-${{ matrix.arch }}-*.zip
          overwrite: true

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      # Ensure tag exists for workflow_dispatch
      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.version }}"

          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      # Create release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.prerelease }}
          files: release/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
