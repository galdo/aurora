name: windows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3 or v1.2.3-beta)'
        type: string

permissions:
  contents: write

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 60

    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --frozen-lockfile --non-interactive || yarn install --non-interactive

      # Resolve version once (input, tag or commit)
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            BUILD="${GITHUB_RUN_NUMBER}"
            COMMIT="${GITHUB_SHA::7}"

            VERSION="${BASE_VERSION}-dev.${BUILD}.git${COMMIT}"
          fi

          # Remove 'v' to keep the slug consistent
          VERSION="${VERSION#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync app version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Package Windows app
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          yarn package:win

      # Always upload CI artifact
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.exe
          overwrite: true

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release

      # Ensure tag exists for workflow_dispatch
      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.version }}"

          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      # Create release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.prerelease }}
          files: |
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
