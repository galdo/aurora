name: release-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.2 or 1.5.2)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  build_macos:
    name: Build macOS (${{ matrix.arch }})
    needs: meta
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          # yarn.lock can resolve packages as git+ssh://git@github.com/... (no SSH in CI → exit 128 without this).
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build macOS app
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          npm run "prepare:sharp:mac:${ARCH}"
          npm run "prepare:mpv:mac:${ARCH}"
          npm run package -- --mac --${ARCH} --c.mac.identity=null

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_windows:
    name: Build Windows
    needs:
      - meta
      - build_macos
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          # yarn.lock can resolve packages as git+ssh://git@github.com/... (no SSH in CI → exit 128 without this).
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package Windows app
        shell: bash
        run: |
          yarn package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_linux_flatpak:
    name: Build Linux Flatpak
    needs:
      - meta
      - build_windows
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Configure flathub remote
        run: |
          sudo flatpak --system remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Preinstall flatpak runtime dependencies
        run: |
          sudo flatpak --system install -y flathub org.freedesktop.Platform//23.08
          sudo flatpak --system install -y flathub org.freedesktop.Sdk//23.08
          sudo flatpak --system install -y flathub org.electronjs.Electron2.BaseApp//23.08

      - name: Verify flatpak runtime availability
        run: |
          flatpak remotes --system
          flatpak list --system | grep -E 'org.freedesktop.Platform|org.freedesktop.Sdk|org.electronjs.Electron2.BaseApp'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          # yarn.lock can resolve packages as git+ssh://git@github.com/... (no SSH in CI → exit 128 without this).
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build Linux Flatpak
        shell: bash
        run: |
          yarn package:linux:flatpak:x64

      - name: Upload Linux Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: release/*.flatpak
          if-no-files-found: error
          overwrite: true

  release:
    name: Publish GitHub Release
    needs:
      - meta
      - build_macos
      - build_windows
      - build_linux_flatpak
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Ensure tag exists
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Release ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          body: |
            ## Aurora Pulse 1.5.1

            Stable release. Functional changes since **1.5.0** focus on **DAP sync over ADB**, **DLNA / remote playback**, and **player stability**.

            ### DAP sync (ADB and library)
            - **ADB transport** for USB-connected Android players: push `Music/` and `Podcasts/` without mounting the device as a disk; automatic **storage discovery** (external/SD-first when writable).
            - **Robust remote paths**: shell-safe quoting so folders and files with **spaces, parentheses, and similar characters** copy and verify correctly.
            - **“Mirror PC/Mac folder layout”** (Settings): when enabled, tracks sync under `Music/` using the same relative paths as your configured local library folders; when disabled, Aurora uses tag-based Artist/Album layout.
            - **Cleaning / “remove missing on device”** streams the remote file list instead of loading the entire tree into memory—fixes sync **stuck near 100%** on large libraries and reduces **renderer memory pressure**.
            - Clearer **planning → copying → cleaning** progress, resumable checkpoints, and improved behavior on cancel or disconnect.
            - Verbose per-file transfer logging removed from normal builds (optional developer diagnostics via `DEBUG` namespaces).

            ### DLNA and remote playback
            - Further **queue and transition** handling for DLNA renderers and **Aurora Pulse Launcher** contexts (gating launcher-specific commands where supported).
            - More reliable **next/previous** from the app when the renderer’s native transport is inconsistent; improved handling of short **STOPPED / TRANSITIONING** gaps between tracks.
            - **Renderer state reconciliation** tuned to reduce false timeline resets and UI flicker.
            - DLNA internals split into **focused modules** under `src/services/dlna/`; subscribe recovery covered by unit tests.

            ### Player and UI
            - **Media player** and **media session** refinements; **Settings** copy and status strings for DAP (including new options above), with updated translations.

            ### Installation
            - **macOS:** Open the DMG, drag **Aurora Pulse** into Applications. If Gatekeeper blocks the first launch, right-click the app → **Open**.
            - **Windows:** Run the `.exe` installer. If SmartScreen appears, use **More info** → **Run anyway**.
            - **Linux (Flatpak):** Install the `.flatpak` with your Flatpak UI or `flatpak install`.
          files: |
            release/macos-arm64/*.dmg
            release/macos-arm64/*.zip
            release/macos-arm64/*.blockmap
            release/macos-arm64/latest-mac.yml
            release/macos-x64/*.dmg
            release/macos-x64/*.zip
            release/macos-x64/*.blockmap
            release/windows/*.exe
            release/windows/*.blockmap
            release/windows/latest.yml
            release/windows/builder-debug.yml
            release/linux-flatpak/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
