name: release-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.2 or 1.5.2)'
        required: true
        type: string

permissions:
  contents: write
  # NOTE on the v1.5.6 tag-push incident:
  # GitHub Actions' GITHUB_TOKEN cannot push refs whose history contains
  # changes to files under `.github/workflows/` — that always requires the
  # `workflows` scope, which is not exposed as a granular workflow
  # permission and which `GITHUB_TOKEN` simply doesn't have.
  # Workarounds (any of):
  #   1. Tag the release commit locally and push the tag with a PAT that
  #      has the `workflows` scope before triggering the workflow.
  #   2. Use `softprops/action-gh-release@v1` which auto-creates the tag
  #      via the Releases API (no `git push` of refs is needed). See the
  #      `Create GitHub Release` step below — we now skip the manual
  #      tag-push step on cache hit and rely on action-gh-release to
  #      create the tag if missing.

concurrency:
  group: release-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout (for package.json sync check)
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Resolve & validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            : # plain semver release
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)[0-9]+$ ]]; then
            : # accepted prerelease form (no dot)
          else
            echo "::error::Invalid version format '$VERSION'. Expected 'X.Y.Z' or 'X.Y.Z-betaN' (no dot before the number)."
            exit 1
          fi
          ROOT_VERSION=$(node -p "require('./package.json').version")
          SRC_VERSION=$(node -p "require('./src/package.json').version")
          if [[ "$ROOT_VERSION" != "$VERSION" ]]; then
            echo "::error::package.json version is '$ROOT_VERSION' but workflow was triggered with '$VERSION'."
            exit 1
          fi
          if [[ "$SRC_VERSION" != "$VERSION" ]]; then
            echo "::error::src/package.json version is '$SRC_VERSION' but workflow was triggered with '$VERSION'."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  # All build jobs depend ONLY on `meta` so they run fully in parallel.
  # macOS arm64 + x64 also run in parallel inside the matrix.
  # Wall-clock ≈ Max(macOS, Windows, Linux) instead of Sum().

  build_macos:
    name: Build macOS (${{ matrix.arch }})
    needs: meta
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache node_modules + electron + mpv
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src/node_modules
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.electron-gyp
            assets/bin/mpv
          key: ${{ runner.os }}-${{ matrix.arch }}-deps-${{ hashFiles('yarn.lock', 'src/yarn.lock', 'package.json', 'src/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-deps-

      - name: Remove npm lockfiles
        shell: bash
        run: rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          if grep -q 'git+ssh://git@github.com' yarn.lock; then
            echo '::error::yarn.lock uses git+ssh for github.com — replace resolved URL with git+https://'
            grep -n 'git+ssh://' yarn.lock || true
            exit 1
          fi
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build macOS app
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          npm run "prepare:sharp:mac:${ARCH}"
          npm run "prepare:mpv:mac:${ARCH}"
          npm run package -- --mac --${ARCH} --c.mac.identity=null

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_windows:
    name: Build Windows
    needs: meta
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache node_modules + electron
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src/node_modules
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/.electron-gyp
          key: ${{ runner.os }}-deps-${{ hashFiles('yarn.lock', 'src/yarn.lock', 'package.json', 'src/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Remove npm lockfiles
        shell: bash
        run: rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          if grep -q 'git+ssh://git@github.com' yarn.lock; then
            echo '::error::yarn.lock uses git+ssh for github.com'
            grep -n 'git+ssh://' yarn.lock || true
            exit 1
          fi
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package Windows app
        shell: bash
        run: yarn package:win

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_linux_flatpak:
    name: Build Linux Flatpak
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install flatpak toolchain
        run: |
          sudo apt-get update
          # imagemagick is needed by flatpak/scripts/generate-icons.sh
          # to render the rounded squircle icon into all hicolor sizes.
          # appstream-util + desktop-file-utils give us metadata
          # validation, so a broken release can never reach Flathub.
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            imagemagick \
            appstream-util \
            desktop-file-utils

      - name: Configure flathub remote
        run: sudo flatpak --system remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache flatpak system runtimes
        id: flatpak-cache
        uses: actions/cache@v4
        with:
          path: /var/lib/flatpak
          key: flatpak-runtimes-23.08-v1
          restore-keys: |
            flatpak-runtimes-23.08-

      - name: Preinstall flatpak runtime dependencies
        if: steps.flatpak-cache.outputs.cache-hit != 'true'
        run: |
          sudo flatpak --system install -y flathub org.freedesktop.Platform//23.08
          sudo flatpak --system install -y flathub org.freedesktop.Sdk//23.08
          sudo flatpak --system install -y flathub org.electronjs.Electron2.BaseApp//23.08

      - name: Verify flatpak runtime availability
        run: |
          flatpak remotes --system
          flatpak list --system | grep -E 'org.freedesktop.Platform|org.freedesktop.Sdk|org.electronjs.Electron2.BaseApp' || (echo "::error::Required flatpak runtimes missing"; exit 1)

      - name: Cache node_modules + electron
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src/node_modules
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/.electron-gyp
          key: ${{ runner.os }}-deps-${{ hashFiles('yarn.lock', 'src/yarn.lock', 'package.json', 'src/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Remove npm lockfiles
        shell: bash
        run: rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          if grep -q 'git+ssh://git@github.com' yarn.lock; then
            echo '::error::yarn.lock uses git+ssh for github.com'
            grep -n 'git+ssh://' yarn.lock || true
            exit 1
          fi
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build Linux Flatpak
        shell: bash
        run: yarn package:linux:flatpak:x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: release/*.flatpak
          if-no-files-found: error
          overwrite: true

  release:
    name: Publish GitHub Release
    needs:
      - meta
      - build_macos
      - build_windows
      - build_linux_flatpak
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Ensure tag exists
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Release ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          body: |
            ## Aurora Pulse ${{ needs.meta.outputs.version }}

            Stable release. See the release notes below for functional changes.

            ### Installation
            - **macOS:** Open the DMG, drag **Aurora Pulse** into Applications. If Gatekeeper blocks the first launch, right-click the app → **Open**.
            - **Windows:** Run the `.exe` installer. If SmartScreen appears, use **More info** → **Run anyway**.
            - **Linux (Flatpak):** Install the `.flatpak` with your Flatpak UI or `flatpak install`.
          files: |
            release/macos-arm64/*.dmg
            release/macos-arm64/*.zip
            release/macos-arm64/*.blockmap
            release/macos-arm64/latest-mac.yml
            release/macos-x64/*.dmg
            release/macos-x64/*.zip
            release/macos-x64/*.blockmap
            release/windows/*.exe
            release/windows/*.blockmap
            release/windows/latest.yml
            release/windows/builder-debug.yml
            release/linux-flatpak/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
