name: release-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.2 or 1.5.2)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout (for package.json sync check)
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Resolve & validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          # ------------------------------------------------------------------
          # Aurora version-format guard.
          #
          # The repo standard is `vX.Y.Z` for stables and `vX.Y.Z-betaN`
          # (no dot between identifier and number) for prereleases.
          # `npm version` defaults to `X.Y.Z-beta.N` (with a dot) which:
          #   1. breaks our naming convention for tags / asset filenames,
          #   2. triggers the electron-updater channel bug we worked around
          #      in `runCustomUpdateCheck()` — see commit message of
          #      "fix(updater): custom GitHub Releases lookup ..." for
          #      background.
          # We refuse to publish anything that uses the dotted form so that
          # bumping always requires the correct format end-to-end.
          # ------------------------------------------------------------------
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            : # plain semver release, fine
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)[0-9]+$ ]]; then
            : # accepted prerelease form (no dot)
          else
            echo "::error::Invalid version format '$VERSION'. Expected 'X.Y.Z' or 'X.Y.Z-betaN' (no dot before the number, e.g. 1.5.6-beta5)."
            exit 1
          fi

          # Ensure the package.json files match the requested release exactly.
          # This catches the case where someone forgot to bump them (or where
          # `npm version` left the dotted `beta.N` form behind).
          ROOT_VERSION=$(node -p "require('./package.json').version")
          SRC_VERSION=$(node -p "require('./src/package.json').version")
          if [[ "$ROOT_VERSION" != "$VERSION" ]]; then
            echo "::error::package.json version is '$ROOT_VERSION' but workflow was triggered with '$VERSION'. Bump package.json before tagging."
            exit 1
          fi
          if [[ "$SRC_VERSION" != "$VERSION" ]]; then
            echo "::error::src/package.json version is '$SRC_VERSION' but workflow was triggered with '$VERSION'. Bump src/package.json before tagging."
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  build_macos:
    name: Build macOS (${{ matrix.arch }})
    needs: meta
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          # Yarn may still fetch git+ssh from lockfile; git insteadOf is not always applied → keep lockfile on git+https.
          if grep -q 'git+ssh://git@github.com' yarn.lock; then
            echo '::error::yarn.lock uses git+ssh for github.com — replace resolved URL with git+https:// (see @electron/node-gyp).'
            grep -n 'git+ssh://' yarn.lock || true
            exit 1
          fi
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build macOS app
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          npm run "prepare:sharp:mac:${ARCH}"
          npm run "prepare:mpv:mac:${ARCH}"
          npm run package -- --mac --${ARCH} --c.mac.identity=null

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_windows:
    name: Build Windows
    needs:
      - meta
      - build_macos
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          # Yarn may still fetch git+ssh from lockfile; git insteadOf is not always applied → keep lockfile on git+https.
          if grep -q 'git+ssh://git@github.com' yarn.lock; then
            echo '::error::yarn.lock uses git+ssh for github.com — replace resolved URL with git+https:// (see @electron/node-gyp).'
            grep -n 'git+ssh://' yarn.lock || true
            exit 1
          fi
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package Windows app
        shell: bash
        run: |
          yarn package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_linux_flatpak:
    name: Build Linux Flatpak
    needs:
      - meta
      - build_windows
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Configure flathub remote
        run: |
          sudo flatpak --system remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Preinstall flatpak runtime dependencies
        run: |
          sudo flatpak --system install -y flathub org.freedesktop.Platform//23.08
          sudo flatpak --system install -y flathub org.freedesktop.Sdk//23.08
          sudo flatpak --system install -y flathub org.electronjs.Electron2.BaseApp//23.08

      - name: Verify flatpak runtime availability
        run: |
          flatpak remotes --system
          flatpak list --system | grep -E 'org.freedesktop.Platform|org.freedesktop.Sdk|org.electronjs.Electron2.BaseApp'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          # Yarn may still fetch git+ssh from lockfile; git insteadOf is not always applied → keep lockfile on git+https.
          if grep -q 'git+ssh://git@github.com' yarn.lock; then
            echo '::error::yarn.lock uses git+ssh for github.com — replace resolved URL with git+https:// (see @electron/node-gyp).'
            grep -n 'git+ssh://' yarn.lock || true
            exit 1
          fi
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build Linux Flatpak
        shell: bash
        run: |
          yarn package:linux:flatpak:x64

      - name: Upload Linux Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: release/*.flatpak
          if-no-files-found: error
          overwrite: true

  release:
    name: Publish GitHub Release
    needs:
      - meta
      - build_macos
      - build_windows
      - build_linux_flatpak
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Ensure tag exists
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Release ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          body: |
            ## Aurora Pulse ${{ needs.meta.outputs.version }}

            Stable release. See the release notes below for functional changes.

            ### Installation
            - **macOS:** Open the DMG, drag **Aurora Pulse** into Applications. If Gatekeeper blocks the first launch, right-click the app → **Open**.
            - **Windows:** Run the `.exe` installer. If SmartScreen appears, use **More info** → **Run anyway**.
            - **Linux (Flatpak):** Install the `.flatpak` with your Flatpak UI or `flatpak install`.
          files: |
            release/macos-arm64/*.dmg
            release/macos-arm64/*.zip
            release/macos-arm64/*.blockmap
            release/macos-arm64/latest-mac.yml
            release/macos-x64/*.dmg
            release/macos-x64/*.zip
            release/macos-x64/*.blockmap
            release/windows/*.exe
            release/windows/*.blockmap
            release/windows/latest.yml
            release/windows/builder-debug.yml
            release/linux-flatpak/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}