name: release-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.2 or 1.5.2)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  build_macos:
    name: Build macOS (${{ matrix.arch }})
    needs: meta
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build macOS app
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          npm run "prepare:sharp:mac:${ARCH}"
          npm run "prepare:mpv:mac:${ARCH}"
          npm run package -- --mac --${ARCH} --c.mac.identity=-

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_windows:
    name: Build Windows
    needs:
      - meta
      - build_macos
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package Windows app
        shell: bash
        run: |
          yarn package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          overwrite: true

  build_linux_flatpak:
    name: Build Linux Flatpak
    needs:
      - meta
      - build_windows
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Configure flathub remote
        run: |
          sudo flatpak --system remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Preinstall flatpak runtime dependencies
        run: |
          sudo flatpak --system install -y flathub org.freedesktop.Platform//23.08
          sudo flatpak --system install -y flathub org.freedesktop.Sdk//23.08
          sudo flatpak --system install -y flathub org.electronjs.Electron2.BaseApp//23.08

      - name: Verify flatpak runtime availability
        run: |
          flatpak remotes --system
          flatpak list --system | grep -E 'org.freedesktop.Platform|org.freedesktop.Sdk|org.electronjs.Electron2.BaseApp'

      - name: Remove npm lockfiles
        shell: bash
        run: |
          rm -f package-lock.json src/package-lock.json

      - name: Force GitHub HTTPS for git dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --non-interactive --silent

      - name: Sync app version
        shell: bash
        run: |
          npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build Linux Flatpak
        shell: bash
        run: |
          yarn package:linux:flatpak:x64

      - name: Upload Linux Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: release/*.flatpak
          if-no-files-found: error
          overwrite: true

  release:
    name: Publish GitHub Release
    needs:
      - meta
      - build_macos
      - build_windows
      - build_linux_flatpak
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Ensure tag exists
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Release ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          body: |
            ### Release 1.5.0 (Beta 7)
            Changelog (based on code changes between v1.4.0 and v1.5.0)

            **Added**
            - Shared collection view controls across Albums, Artists, Playlists, and Podcasts (cover-size slider + unified sorting controls).
            - Bit-Perfect parallel audio chain (using mpv library)
            - DLNA Server with Broadcasting Tracks, Albums, Album-Artists / Artists, Playlists and Podcasts
            - DLNA Control for Devices like DLNA Ready Speakers, TVs, ...
            - Most-Played (100 Tracks) Playlist automaticall created
            - Gapless Audio Playback on Albums
            - Global single-instance right sideview state store to prevent stacked overlays and enable clean content replacement.
            - Auto-Update support implemented
            - Linux Flatpak packaging support (x86_64) including build scripts, Flatpak metadata, and a dedicated GitHub Actions workflow.
            - Library export utility script for JSON snapshots and diagnostics (not available for public use)
            - Extended track metadata persistence for technical audio details (sample rate, bit depth, bitrate, codec, file type).
            - Additional languages added: chinese (simplified), hindi, portuguese, turkish and many more

            **Changed**
            - Equalizer evolved into a fuller tuning workflow with AutoEQ profile support, history handling, and stronger UX.
            - Podcasts area was redesigned for parity with Library layout, sorting, and cover-size synchronization.
            - Player and sideview interaction model refined: title click opens/reuses sideview, transitions are smoother, and visual focus is more consistent.
            - README rewritten as a product-focused landing page with clearer value messaging and fork rationale.
            - Switch for Artists view extended - new Option "Album Artist" introduced to change the artist listing from all artists (on track level) to album related artists
            - Settings, topbar actions, and secondary button styling were streamlined for clearer primary/secondary action hierarchy.
            - All Playlist and Albums now can be pinned to the left sidebar
            - Import Details shown during Initial- and Delta Import and DAP Sync
            - Performance Optimization in Search and Import

            **Fixed**
            - Resolved sideview stacking behavior by reusing a single global sideview instance.
            - Fixed inconsistent hover/text styling for secondary actions.
            - Fixed multiple layout mismatches between Library and Podcasts (header, spacing, grid alignment, cover presentation).
            - Improved reliability of metadata display paths in player and media ingestion flow.
            - Stabilized packaging prerequisites for native sharp runtimes across targets.
            - Memory and Performance Optimizations
            - Fixing issues with Auto-Update
            - Fixing issues with DLNA Streaming Control-Issues in Player
            - Fixing crash on DAP disconnect
            - Count issue fixed for "most played"-Playlist
            - Fixing sync issue with DAP

            **Notes**
            - Scope intentionally reflects the practical delta from v1.4.0 to v1.5.0 across UX, playback transparency, build/release workflow, and platform packaging readiness.
          files: |
            release/macos-arm64/*.dmg
            release/macos-arm64/*.zip
            release/macos-arm64/*.blockmap
            release/macos-arm64/latest-mac.yml
            release/macos-x64/*.dmg
            release/macos-x64/*.zip
            release/macos-x64/*.blockmap
            release/windows/*.exe
            release/windows/*.blockmap
            release/windows/latest.yml
            release/windows/builder-debug.yml
            release/linux-flatpak/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
