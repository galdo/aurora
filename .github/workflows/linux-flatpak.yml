name: linux-flatpak

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '45 2 * * *'

  pull_request:
    branches:
      - main

  push:
    branches:
      - main
    tags:
      - '*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.5.0 or v1.5.0-beta)'
        type: string

jobs:
  build:
    name: Build Linux Flatpak (x86_64)
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Configure flathub remote
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Preinstall flatpak runtime dependencies
        run: |
          flatpak install -y flathub org.freedesktop.Platform//23.08
          flatpak install -y flathub org.freedesktop.Sdk//23.08
          flatpak install -y flathub org.electronjs.Electron2.BaseApp//23.08

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            BUILD="${GITHUB_RUN_NUMBER}"
            COMMIT="${GITHUB_SHA::7}"
            VERSION="${BASE_VERSION}-dev.${BUILD}.git${COMMIT}"
          fi

          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync app version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Package Linux Flatpak
        shell: bash
        run: |
          yarn package:linux:flatpak:x64

      - name: List release artifacts
        run: |
          ls -lah release

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-x86_64
          path: release/*.flatpak
          if-no-files-found: error
          overwrite: true

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak-x86_64
          path: release

      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.version }}"

          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.prerelease }}
          files: release/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
