# ─────────────────────────────────────────────────────────────────────────────
# Flathub Publish Job – Add this to your .github/workflows/release-all.yml
# ─────────────────────────────────────────────────────────────────────────────
# Prerequisites:
#   1. Repository secret FLATHUB_TOKEN (GitHub PAT with push access to
#      flathub/app.better_craft.aurorapulse)
#   2. Linux build job produces a tar.gz artifact named
#      "Aurora-Pulse-<version>-linux-x64.tar.gz"
#   3. The Flathub repo flathub/app.better_craft.aurorapulse exists and
#      contains the same files as this project's flatpak/ directory.
# ─────────────────────────────────────────────────────────────────────────────

  publish-flathub:
    name: Publish to Flathub
    needs: [build-linux]  # adjust to your actual Linux build job name
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta')
    steps:
      - name: Checkout Flathub manifest repo
        uses: actions/checkout@v4
        with:
          repository: flathub/app.better_craft.aurorapulse
          token: ${{ secrets.FLATHUB_TOKEN }}
          path: flathub-repo

      - name: Download Linux tar.gz artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-tar-gz  # adjust to your artifact name
          path: ./artifact

      - name: Determine version and SHA256
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL=$(find ./artifact -name "*.tar.gz" | head -1)
          SHA256=$(sha256sum "$TARBALL" | awk '{print $1}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "SHA256:  $SHA256"

      - name: Update manifest URL and SHA256
        working-directory: flathub-repo
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHA256="${{ steps.meta.outputs.sha256 }}"
          
          sed -i "s|url:.*github.com/galdo/aurora/releases/download/.*|url: https://github.com/galdo/aurora/releases/download/v${VERSION}/Aurora-Pulse-${VERSION}-linux-x64.tar.gz|" \
            app.better_craft.aurorapulse.yml
          
          sed -i "s|sha256:.*|sha256: ${SHA256}|" \
            app.better_craft.aurorapulse.yml

      - name: Update metainfo release version
        working-directory: flathub-repo
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TODAY=$(date +%Y-%m-%d)
          
          sed -i "s|<release version=\"[^\"]*\" date=\"[^\"]*\"|<release version=\"${VERSION}\" date=\"${TODAY}\"|" \
            app.better_craft.aurorapulse.metainfo.xml

      - name: Commit and push to Flathub
        working-directory: flathub-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update to v${{ steps.meta.outputs.version }}"
          git push